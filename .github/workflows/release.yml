name: Release

# Publishes to PyPI when a version tag (v*) is pushed.
#
# Recommended auth: PyPI Trusted Publishing (OIDC) — no secret to store.
#   One-time setup on https://pypi.org → project "payhub" → Publishing:
#     add a GitHub publisher (owner: BarkaPay, repo: payhub-python,
#     workflow: release.yml, environment: pypi). The id-token permission
#     below is what lets PyPI trust this workflow.
#
# Token fallback (if you prefer): remove the `permissions: id-token` block and
# the `environment:`, then pass a PyPI API token to the publish step:
#     with:
#       password: ${{ secrets.PYPI_API_TOKEN }}
#
# Cut a release: bump the version in src/payhub/_version.py, commit, then
#     git tag vX.Y.Z && git push --follow-tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest

  publish:
    name: Build & publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*' src/payhub/_version.py | head -1)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match _version.py $pkg"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
